<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canva Blog Widgets — Automated Demo Showcase</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,Arial,sans-serif}
  body{background:#0f172a;color:#e2e8f0;min-height:100vh}

  /* Top bar */
  .topbar{background:#1e293b;border-bottom:1px solid #334155;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .topbar h1{font-size:16px;font-weight:700;color:#f8fafc;letter-spacing:-.3px}
  .topbar h1 span{color:#3b82f6}
  .controls{display:flex;align-items:center;gap:12px}
  .controls select{background:#334155;color:#e2e8f0;border:1px solid #475569;border-radius:6px;padding:6px 12px;font-size:13px;cursor:pointer}
  .controls select:focus{outline:none;border-color:#3b82f6}
  .cbtn{padding:7px 16px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
  .cbtn.primary{background:#3b82f6;color:#fff}.cbtn.primary:hover{background:#2563eb}
  .cbtn.primary:disabled{opacity:.4;cursor:not-allowed}
  .cbtn.danger{background:#dc2626;color:#fff}.cbtn.danger:hover{background:#b91c1c}
  .cbtn.outline{background:transparent;color:#94a3b8;border:1px solid #475569}.cbtn.outline:hover{color:#f8fafc;border-color:#64748b}
  .speed-lbl{font-size:12px;color:#64748b}

  /* Layout */
  .main{display:flex;height:calc(100vh - 53px)}
  .sidebar{width:280px;background:#1e293b;border-right:1px solid #334155;overflow-y:auto;flex-shrink:0}
  .viewer{flex:1;display:flex;flex-direction:column;overflow:hidden}

  /* Widget cards in sidebar */
  .wcard{padding:14px 16px;border-bottom:1px solid #334155;cursor:pointer;transition:background .15s}
  .wcard:hover{background:#334155}
  .wcard.active{background:#1e3a5f;border-left:3px solid #3b82f6}
  .wcard .wnum{font-size:11px;font-weight:700;color:#3b82f6;text-transform:uppercase;letter-spacing:.5px}
  .wcard .wname{font-size:14px;font-weight:600;color:#f1f5f9;margin:3px 0 2px}
  .wcard .wdesc{font-size:12px;color:#94a3b8;line-height:1.4}
  .wcard .wtags{margin-top:6px;display:flex;gap:5px;flex-wrap:wrap}
  .wcard .tag{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:600}
  .tag.quiz{background:rgba(59,130,246,.15);color:#60a5fa}
  .tag.form{background:rgba(34,197,94,.15);color:#4ade80}
  .tag.calc{background:rgba(245,158,11,.15);color:#fbbf24}

  /* Iframe area */
  .iframe-wrap{flex:1;position:relative;background:#1e293b}
  .iframe-wrap iframe{width:100%;height:100%;border:none;border-radius:0}

  /* Log panel */
  .log-panel{height:180px;background:#0f172a;border-top:1px solid #334155;overflow-y:auto;padding:10px 16px;flex-shrink:0}
  .log-panel .log-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .log-panel .log-hdr h3{font-size:12px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
  .log-entry{font-size:12px;padding:3px 0;line-height:1.5;font-family:'Cascadia Code','Fira Code',monospace;border-bottom:1px solid rgba(51,65,85,.3)}
  .log-entry .lt{color:#64748b;margin-right:8px}
  .log-entry.step{color:#60a5fa}
  .log-entry.action{color:#4ade80}
  .log-entry.result{color:#fbbf24}
  .log-entry.error{color:#f87171}
  .log-entry.info{color:#94a3b8}
  .log-entry.success{color:#34d399}

  /* Progress bar */
  .prog-bar{height:3px;background:#334155;position:relative}
  .prog-bar .prog-fill{height:100%;background:#3b82f6;transition:width .3s ease;width:0}

  /* Status badge */
  .status-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:99px}
  .status-badge.idle{background:#334155;color:#94a3b8}
  .status-badge.running{background:rgba(59,130,246,.15);color:#60a5fa}
  .status-badge.done{background:rgba(34,197,94,.15);color:#4ade80}
  .status-badge.paused{background:rgba(245,158,11,.15);color:#fbbf24}
  .status-badge .dot{width:6px;height:6px;border-radius:50%}
  .status-badge.idle .dot{background:#94a3b8}
  .status-badge.running .dot{background:#60a5fa;animation:pulse 1s infinite}
  .status-badge.done .dot{background:#4ade80}
  .status-badge.paused .dot{background:#fbbf24}

  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  @media(max-width:800px){.sidebar{display:none}.main{flex-direction:column}}
</style>
</head>

<div class="topbar">

    <div id="statusBadge" class="status-badge idle"><span class="dot"></span><span id="statusText">Idle</span></div>
    <label class="speed-lbl">Speed:</label>

    </select>

    <button class="cbtn outline" id="btnRunAll">Run All (sequence)</button>
  </div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="viewer">
    <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
    <div class="iframe-wrap"><iframe id="widgetFrame" src="about:blank"></iframe></div>
    <div class="log-panel">
      <div class="log-hdr">

        <button class="cbtn outline" style="padding:3px 8px;font-size:11px" id="btnClearLog">Clear</button>
      </div>
      <div id="logBody"></div>
    </div>
  </div>
</div>

  /* ── Iframe helpers ── */
  function getDoc(){try{return document.getElementById('widgetFrame').contentDocument||document.getElementById('widgetFrame').contentWindow.document}catch(e){return null}}
  function getWin(){try{return document.getElementById('widgetFrame').contentWindow}catch(e){return null}}

  function scrollElIntoView(el){
    if(!el)return;
    try{el.scrollIntoView({behavior:'smooth',block:'center'})}catch(e){}
  }
  function setSel(w,id,v){
    var d=getDoc();if(!d)return;
    var el=d.getElementById(id);if(!el)return;
    scrollElIntoView(el);
    el.value=v;
    el.dispatchEvent(new Event('change',{bubbles:true}));
  }
  function setVal(w,id,v){
    var d=getDoc();if(!d)return;
    var el=d.getElementById(id);if(!el)return;
    scrollElIntoView(el);
    el.value='';el.focus();
    // type character by character for visual effect (fast)
    for(var i=0;i<v.length;i++){el.value+=v[i]}
    el.dispatchEvent(new Event('input',{bubbles:true}));
    el.dispatchEvent(new Event('change',{bubbles:true}));
  }
  function setCheck(w,id,v){
    var d=getDoc();if(!d)return;
    var el=d.getElementById(id);if(!el)return;
    scrollElIntoView(el);
    el.checked=v;
    el.dispatchEvent(new Event('change',{bubbles:true}));
  }
  function click(w,id){
    var d=getDoc();if(!d)return;
    var el=d.getElementById(id);if(!el)return;
    scrollElIntoView(el);
    el.click();
  }
  function clickBtn(w,id){
    var d=getDoc();if(!d)return;
    var el=d.getElementById(id);if(!el)return;
    scrollElIntoView(el);
    el.click();
  }
  function clickLi(w,idx){
    var d=getDoc();if(!d)return;
    var items=d.querySelectorAll('#cl li');
    if(items[idx]){
      scrollElIntoView(items[idx]);
      var cb=items[idx].querySelector('input');
      if(cb){cb.checked=!cb.checked;cb.dispatchEvent(new Event('change',{bubbles:true}))}
    }
  }
  function clickScheme(w,idx){
    var d=getDoc();if(!d)return;
    var cards=d.querySelectorAll('.sc');
    if(cards[idx]){scrollElIntoView(cards[idx]);cards[idx].click();}
  }
  function clickQuizOption(w,optIdx){
    var d=getDoc();if(!d)return;
    var btns=d.querySelectorAll('.ob');
    if(btns[optIdx]){scrollElIntoView(btns[optIdx]);btns[optIdx].click();}
  }
  function setRange(w,id,v){
    var d=getDoc();if(!d)return;
    var el=d.getElementById(id);if(!el)return;
    scrollElIntoView(el);
    el.value=v;
    el.dispatchEvent(new Event('input',{bubbles:true}));
    el.dispatchEvent(new Event('change',{bubbles:true}));
  }
  function fillStandardForm(w){
    var d=getDoc();if(!d)return;
    var fns=[
      function(){setVal(w,'lf-name','Sarah Johnson')},
      function(){setVal(w,'lf-phone','07700 123456')},
      function(){setVal(w,'lf-email','sarah.j@example.com')},
      function(){setVal(w,'lf-addr','28 Elm Street')},
      function(){setVal(w,'lf-pc','B15 2TT')},
      function(){setSel(w,'lf-ptype','semi')},
      function(){setSel(w,'lf-floc','cavity_walls')},
      function(){setSel(w,'lf-iyear','5-10')},
      function(){setSel(w,'lf-inst','energy_co')},
      function(){setSel(w,'lf-surv','no')},
      function(){setCheck(w,'i1',true);setCheck(w,'i4',true);setCheck(w,'i5',true);setCheck(w,'i7',true)},
      function(){setSel(w,'lf-own','owner_occupier')},
      function(){setSel(w,'lf-urg','soon')},
      function(){setSel(w,'lf-contact','phone')},
      function(){setSel(w,'lf-src','facebook')},
    ];
    fns.forEach(function(f){f()});
  }

  /* ── UI refs ── */
  var sidebar=document.getElementById('sidebar');
  var frame=document.getElementById('widgetFrame');
  var logBody=document.getElementById('logBody');
  var progFill=document.getElementById('progFill');
  var btnRun=document.getElementById('btnRun');
  var btnStop=document.getElementById('btnStop');
  var btnRunAll=document.getElementById('btnRunAll');
  var btnClearLog=document.getElementById('btnClearLog');
  var speedSel=document.getElementById('speedSel');
  var statusBadge=document.getElementById('statusBadge');
  var statusText=document.getElementById('statusText');

  var activeIdx=0, running=false, stopped=false, runAllMode=false;

  /* ── Build sidebar ── */
  widgets.forEach(function(w,i){
    var div=document.createElement('div');
    div.className='wcard'+(i===0?' active':'');
    div.setAttribute('data-i',i);
    var tagsHtml=w.tags.map(function(t){return '<span class="tag '+t.c+'">'+t.t+'</span>'}).join('');
    div.innerHTML='<div class="wnum">Widget '+(i+1)+'</div><div class="wname">'+w.name+'</div><div class="wdesc">'+w.desc+'</div><div class="wtags">'+tagsHtml+'</div>';
    div.onclick=function(){if(running)return;selectWidget(i)};
    sidebar.appendChild(div);
  });

  function selectWidget(i){
    activeIdx=i;
    sidebar.querySelectorAll('.wcard').forEach(function(c,j){c.classList.toggle('active',j===i)});
    frame.src=widgets[i].file;
    progFill.style.width='0%';
    log('info','Loaded: '+widgets[i].name+' ('+widgets[i].file+')');
  }

  function setStatus(s,t){statusBadge.className='status-badge '+s;statusText.textContent=t}

  function log(type,msg){
    var now=new Date();var ts=pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
    var div=document.createElement('div');
    div.className='log-entry '+type;
    div.innerHTML='<span class="lt">['+ts+']</span>'+escHtml(msg);
    logBody.appendChild(div);
    logBody.scrollTop=logBody.scrollHeight;
  }
  function pad(n){return n<10?'0'+n:n}
  function escHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

  btnClearLog.onclick=function(){logBody.innerHTML=''};

  /* ── Run demo ── */
  function getSpeed(){return parseInt(speedSel.value)||1500}

  async function runDemo(widgetIdx){
    var w=widgets[widgetIdx];
    selectWidget(widgetIdx);
    running=true;stopped=false;
    btnRun.disabled=true;btnStop.disabled=false;
    setStatus('running','Running: '+w.name);
    log('step','═══ Demo: '+w.name+' ═══');

    // Wait for iframe to load
    await new Promise(function(r){frame.onload=r;if(frame.contentDocument&&frame.contentDocument.readyState==='complete')r()});
    await sleep(500);

    var steps=w.steps;
    for(var i=0;i<steps.length;i++){
      if(stopped)break;
      var s=steps[i];
      progFill.style.width=Math.round(((i+1)/steps.length)*100)+'%';
      log(s.type,s.msg);
      if(s.fn){
        try{s.fn(w)}catch(e){log('error','Action error: '+e.message)}
      }
      await sleep(getSpeed());
    }

    if(!stopped){
      progFill.style.width='100%';
      setStatus('done','Done: '+w.name);
      log('success','═══ '+w.name+' demo finished ═══');
    }else{
      setStatus('paused','Stopped');
      log('info','Demo stopped by user');
    }
    running=false;
    btnRun.disabled=false;btnStop.disabled=true;
  }

  async function runAllDemos(){
    runAllMode=true;
    for(var i=0;i<widgets.length;i++){
      if(stopped){runAllMode=false;return}
      await runDemo(i);
      if(i<widgets.length-1&&!stopped){
        log('info','Pausing 2s before next widget...');
        await sleep(2000);
      }
    }
    runAllMode=false;
    if(!stopped){
      setStatus('done','All demos complete');
      log('success','═══ ALL 5 WIDGET DEMOS COMPLETE ═══');
    }
  }

  btnRun.onclick=function(){if(!running)runDemo(activeIdx)};
  btnStop.onclick=function(){stopped=true};
  btnRunAll.onclick=function(){if(!running){stopped=false;runAllDemos()}};

  function sleep(ms){return new Promise(function(r){setTimeout(r,ms)})}

  // Load first widget
  selectWidget(0);
})();
</script>
</body>
</html>
